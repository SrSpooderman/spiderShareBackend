services:
  api:
    build:
      context: .
    container_name: spidershare_api
    env_file:
      - path: stack.env
        required: false
      - path: .env
        required: false
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - ./storage/videos:${VIDEO_STORAGE_PATH:-/app/storage/videos}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "alembic -c /app/alembic.ini upgrade head &&
      python -m app.bootstrap.seed_super_admin &&
      uvicorn run:app --host 0.0.0.0 --port 8000 --reload"


  mysql:
    image: mysql:8.4
    container_name: spidershare_mysql
    restart: unless-stopped
    env_file:
      - path: stack.env
        required: false
      - path: .env
        required: false
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spidershare}
      MYSQL_USER: ${MYSQL_USER:-spidershare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-spidershare_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
